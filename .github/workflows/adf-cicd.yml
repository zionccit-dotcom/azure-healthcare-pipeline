name: Azure Data Factory CI/CD

on:
  push:
    branches:
      - adf_publish
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_DATA_FACTORY_NAME: ${{ secrets.AZURE_DATA_FACTORY_NAME }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    name: Deploy ADF to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ADF ARM template from adf_publish branch
        run: |
          git fetch origin adf_publish
          git checkout origin/adf_publish -- \
            adf-healthcare-pipelinemk/ARMTemplateForFactory.json \
            adf-healthcare-pipelinemk/ARMTemplateParametersForFactory.json

      - name: Stop ADF Triggers before deployment
        run: |
          echo "Stopping all ADF triggers..."
          az datafactory trigger list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --factory-name ${{ secrets.AZURE_DATA_FACTORY_NAME }} \
            --query "[?properties.runtimeState=='Started'].name" \
            --output tsv | \
          while read trigger; do
            echo "Stopping trigger: $trigger"
            az datafactory trigger stop \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --factory-name ${{ secrets.AZURE_DATA_FACTORY_NAME }} \
              --name "$trigger"
          done
          echo "All triggers stopped"

      - name: Deploy ADF ARM Template
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: adf-healthcare-pipelinemk/ARMTemplateForFactory.json
          parameters: >
            adf-healthcare-pipelinemk/ARMTemplateParametersForFactory.json
            factoryName=${{ secrets.AZURE_DATA_FACTORY_NAME }}
          deploymentMode: Incremental

      - name: Restart ADF Triggers after deployment
        run: |
          echo "Restarting all ADF triggers..."
          az datafactory trigger list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --factory-name ${{ secrets.AZURE_DATA_FACTORY_NAME }} \
            --query "[].name" \
            --output tsv | \
          while read trigger; do
            echo "Starting trigger: $trigger"
            az datafactory trigger start \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --factory-name ${{ secrets.AZURE_DATA_FACTORY_NAME }} \
              --name "$trigger"
          done
          echo "All triggers restarted"

      - name: Deployment Summary
        run: |
          echo "ADF Pipeline deployed successfully!"
          echo "Factory: ${{ env.AZURE_DATA_FACTORY_NAME }}"
          echo "Resource Group: ${{ env.AZURE_RESOURCE_GROUP }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
